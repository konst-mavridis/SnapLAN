<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapLAN V2.7</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: white;
    text-align: center;
    padding: 20px;
}

input, button {
    padding: 12px;
    margin: 8px;
    border-radius: 8px;
    border: none;
    width: 80%;
    max-width: 400px;
}

button {
    background: #4CAF50;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:disabled {
    background: #555;
    cursor: not-allowed;
}

#status {
    margin: 10px;
    color: #aaa;
}

#log {
    margin-top: 20px;
    text-align: left;
    background: #1a1a1a;
    padding: 10px;
    border-radius: 10px;
    height: 250px;
    overflow-y: scroll;
}

#peers div {
    background: #222;
    padding: 8px;
    margin: 4px;
    border-radius: 6px;
}
</style>
</head>

<body>

<h1>SnapLAN V2.7</h1>

<input id="ip" placeholder="PC IP (e.g 192.168.2.2)" />

<br>

<button id="createBtn">Create Session (Host)</button>
<button id="scanBtn">Scan QR (Join)</button>
<button id="searchBtn">Search Network</button>
<button id="connectBtn" disabled>Connect WebSocket</button>
<button id="pingBtn" disabled>Ping</button>
<input type="file" id="fileInput" />
<button id="sendBtn">Send File</button>


<div id="status">Status: idle</div>

<div>
    <canvas id="qr"></canvas>
    <div id="qrText" style="font-size:12px;color:#aaa;"></div>
</div>

<div id="reader" style="width:300px;margin:auto;"></div>

<h3>Peers (Connected)</h3>
<div id="peers"></div>

<h3>Available Devices (Network)</h3>.   
<div id="discovered"></div>

<h3>Log</h3>
<div id="log"></div>




<script src="js/app.js" type="module"></script>
</body>
</html>
